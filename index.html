<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
<title>Lista de Compras</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  /* MANTENDO TODO O SEU DESIGN ORIGINAL */
  :root {
    --bg: #1a1208;
    --surface: #2a1f0f;
    --card: #362912;
    --accent: #e8922a;
    --accent2: #f5c842;
    --text: #f5e6c8;
    --muted: #a0896a;
    --danger: #c0392b;
    --confirm: #27ae60;
    --overlay: rgba(10,7,2,0.85);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 120px;
  }

  header {
    background: var(--surface);
    border-bottom: 3px solid var(--accent);
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  header .logo { font-size: 2.2rem; }
  header h1 { font-size: 1.5rem; font-weight: 900; color: var(--accent2); letter-spacing: -0.5px; }
  header p { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

  .tabs { display: flex; gap: 0; background: var(--surface); border-bottom: 2px solid var(--card); }
  .tab-btn { flex: 1; padding: 14px 8px; background: none; border: none; color: var(--muted); font-size: 0.9rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; border-bottom: 3px solid transparent; }
  .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .tab-badge { background: var(--accent); color: #fff; font-size: 0.7rem; font-weight: 900; border-radius: 10px; padding: 1px 7px; min-width: 22px; }

  .section { display: none; }
  .section.active { display: block; }

  .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; padding: 16px; }

  .item-card {
    background: var(--card);
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    position: relative;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    transition: transform 0.15s;
  }
  .item-card:active { transform: scale(0.95); border-color: var(--accent); }
  .item-card img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #fff; padding: 10px; }
  .item-card .item-emoji { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 5rem; background: var(--surface); }
  .item-card .item-name { padding: 10px; font-size: 1rem; font-weight: 700; text-align: center; }
  .item-card.in-cart { border-color: var(--accent); }
  .in-cart-badge { position: absolute; top: 8px; right: 8px; background: var(--accent); color: #fff; font-weight: 900; border-radius: 12px; padding: 3px 10px; display: none; }
  .item-card.in-cart .in-cart-badge { display: block; }

  /* ADMIN / FORM */
  .admin-section { padding: 16px; }
  .add-form { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 24px; }
  .form-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
  input, select { background: var(--surface); border: 1px solid var(--card); border-radius: 10px; padding: 12px; color: #fff; }
  .btn-add-item { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-weight: 900; font-size: 1.1rem; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: var(--overlay); z-index: 500; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 28px 28px 0 0; padding: 28px; width: 100%; max-width: 480px; border-top: 3px solid var(--accent); }
  .modal-img { width: 120px; height: 120px; margin: 0 auto 15px; background: #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 4rem; overflow: hidden; }
  .modal-name { text-align: center; font-size: 1.5rem; font-weight: 900; color: var(--accent2); margin-bottom: 20px; }
  .qty-control { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 25px; }
  .qty-btn { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 2rem; font-weight: 900; background: var(--accent); color: #fff; }
  .qty-num { font-size: 3rem; font-weight: 900; width: 80px; text-align: center; }
  .modal-actions { display: flex; gap: 10px; }
  .btn-confirm { flex: 2; padding: 15px; background: var(--confirm); border: none; border-radius: 12px; color: #fff; font-weight: 900; }
  .btn-cancel { flex: 1; padding: 15px; background: var(--card); border: none; border-radius: 12px; color: var(--muted); }

  /* CART */
  .cart-item { background: var(--card); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .cart-item img { width: 60px; height: 60px; border-radius: 10px; background: #fff; object-fit: contain; }
  .cart-info { flex: 1; }
  .cart-name { font-weight: 900; }
  .cart-qty { color: var(--accent); font-weight: 900; font-size: 1.2rem; }
  .btn-remove { background: var(--danger); border: none; color: #fff; width: 40px; height: 40px; border-radius: 10px; }

  /* FLOAT CART */
  .float-cart { position: fixed; bottom: 20px; right: 20px; background: var(--accent); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: none; }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--confirm); color: #fff; padding: 10px 20px; border-radius: 20px; font-weight: 900; opacity: 0; transition: 0.3s; z-index: 1000; }
  .toast.show { opacity: 1; top: 80px; }
</style>
</head>
<body>

<header>
  <div class="logo">🛒</div>
  <div>
    <h1>Minha Lista</h1>
    <p>Toque na foto para escolher</p>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('catalog')" id="tab-catalog">🏪 Produtos</button>
  <button class="tab-btn" onclick="showTab('cart')" id="tab-cart">🛍️ Lista <span class="tab-badge" id="cart-badge">0</span></button>
  <button class="tab-btn" onclick="showTab('admin')" id="tab-admin">⚙️ Editar</button>
</div>

<div class="section active" id="section-catalog">
  <div class="items-grid" id="items-grid"></div>
</div>

<div class="section" id="section-cart">
  <div class="admin-section">
    <div id="cart-list"></div>
    <button class="btn-add-item" style="background:var(--danger); margin-top:20px;" onclick="clearCart()">🗑️ Limpar tudo</button>
  </div>
</div>

<div class="section" id="section-admin">
  <div class="admin-section">
    <div class="add-form">
      <h3>Novo Produto</h3>
      <div class="form-row">
        <label>Nome</label>
        <input type="text" id="new-name" placeholder="Ex: Arroz">
      </div>
      <div class="form-row">
        <label>Nome da foto no GitHub (Ex: arroz.png)</label>
        <input type="text" id="new-filename" placeholder="arroz.png">
      </div>
      <button class="btn-add-item" onclick="addNewItem()">✅ Adicionar</button>
    </div>
    <div id="manage-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-img" id="modal-img"></div>
    <div class="modal-name" id="modal-name"></div>
    <div class="qty-control">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <div class="qty-num" id="qty-display">1</div>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">✕</button>
      <button class="btn-confirm" onclick="confirmAdd()">ADICIONAR</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let items = JSON.parse(localStorage.getItem('my_items')) || [
  { id: 1, name: 'Arroz', url: 'img/arroz.png', emoji: '' },
  { id: 2, name: 'Feijão', url: 'img/feijao.png', emoji: ''},
  { id: 3, name: 'Café', url: 'img/cafe.png', emoji:''},
  { id: 4, name: 'Cappuccino', url: 'img/cappuccino.png', emoji: '' }
];
let cart = JSON.parse(localStorage.getItem('my_cart')) || [];
let modalItem = null;
let modalQty = 1;

function save() {
  localStorage.setItem('my_items', JSON.stringify(items));
  localStorage.setItem('my_cart', JSON.stringify(cart));
  updateBadge();
}

function showTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if(tab === 'catalog') renderCatalog();
  if(tab === 'cart') renderCart();
  if(tab === 'admin') renderAdmin();
}

function renderCatalog() {
  const grid = document.getElementById('items-grid');
  grid.innerHTML = '';
  items.forEach(item => {
    const inCart = cart.find(c => c.id === item.id);
    const card = document.createElement('div');
    card.className = 'item-card' + (inCart ? ' in-cart' : '');
    card.onclick = () => openModal(item);
    card.innerHTML = `
      <img src="${item.url}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="item-emoji" style="display:none">${item.emoji}</div>
      <div class="item-name">${item.name}</div>
      <div class="in-cart-badge">${inCart ? inCart.qty : ''}</div>
    `;
    grid.appendChild(card);
  });
}

function openModal(item) {
  modalItem = item;
  modalQty = 1;
  document.getElementById('modal-name').textContent = item.name;
  document.getElementById('qty-display').textContent = modalQty;
  document.getElementById('modal-img').innerHTML = `<img src="${item.url}" style="width:100%;height:100%;object-fit:contain">`;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function changeQty(d) {
  modalQty = Math.max(1, modalQty + d);
  document.getElementById('qty-display').textContent = modalQty;
}

function confirmAdd() {
  const idx = cart.findIndex(c => c.id === modalItem.id);
  if(idx >= 0) cart[idx].qty += modalQty;
  else cart.push({ id: modalItem.id, qty: modalQty });
  save();
  closeModal();
  showToast('Adicionado!');
  renderCatalog();
}

function renderCart() {
  const list = document.getElementById('cart-list');
  list.innerHTML = cart.length ? '' : '<p style="text-align:center">Vazio</p>';
  cart.forEach(c => {
    const item = items.find(i => i.id === c.id);
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <img src="${item.url}">
      <div class="cart-info">
        <div class="cart-name">${item.name}</div>
        <div class="cart-qty">${c.qty}</div>
      </div>
      <button class="btn-remove" onclick="removeFromCart(${item.id})">✕</button>
    `;
    list.appendChild(div);
  });
}

function removeFromCart(id) {
  cart = cart.filter(c => c.id !== id);
  save(); renderCart();
}

function clearCart() { if(confirm('Limpar lista?')) { cart = []; save(); renderCart(); } }

function updateBadge() {
  document.getElementById('cart-badge').textContent = cart.length;
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function addNewItem() {
  const name = document.getElementById('new-name').value;
  const file = document.getElementById('new-filename').value;
  if(!name || !file) return alert('Preencha tudo');
  items.push({ id: Date.now(), name, url: 'img/' + file, emoji: '📦' });
  save();
  document.getElementById('new-name').value = '';
  document.getElementById('new-filename').value = '';
  renderAdmin();
  showToast('Produto Criado!');
}

function renderAdmin() {
  const list = document.getElementById('manage-list');
  list.innerHTML = '<h4>Produtos Atuais:</h4>';
  items.forEach(item => {
    const div = document.createElement('div');
    div.style = "display:flex; justify-content:space-between; background:var(--card); padding:10px; border-radius:10px; margin-top:5px;";
    div.innerHTML = `<span>${item.name}</span> <button onclick="deleteItem(${item.id})" style="background:none; border:none; color:var(--danger)">Remover</button>`;
    list.appendChild(div);
  });
}

function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  save(); renderAdmin();
}

renderCatalog();
updateBadge();
</script>
</body>
</html>
